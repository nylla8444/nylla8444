name: Word of the Day
on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at 00:00 UTC = 8 AM Philippines
  workflow_dispatch:
  
jobs:
  update-word:
    runs-on: ubuntu-latest
    env:
      MW_API_KEY: ${{ secrets.MW_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Word of the Day and update README
        run: |
          python - <<'PYEOF'
          import os, requests, re

          word = "test"  # can later randomize
          api_key = os.environ.get("MW_API_KEY")
          url = f"https://dictionaryapi.com/api/v3/references/collegiate/json/{word}?key={api_key}"

          resp = requests.get(url)
          data = resp.json()

          definition = "No definition found"
          example = ""

          if isinstance(data, list) and len(data) > 0 and isinstance(data[0], dict):
              entry = data[0]

              shortdef = entry.get("shortdef", [])
              if shortdef:
                  definition = shortdef[0]

              try:
                  for def_block in entry.get("def", []):
                      for sseq_block in def_block.get("sseq", []):
                          for sense in sseq_block:
                              if isinstance(sense, list) and len(sense) > 1:
                                  sense_data = sense[1]
                                  if isinstance(sense_data, dict):
                                      for dt_item in sense_data.get("dt", []):
                                          if isinstance(dt_item, list) and dt_item[0] == "vis":
                                              for vis in dt_item[1]:
                                                  raw = vis.get("t", "")
                                                  if raw:
                                                      example = re.sub(r'\{[^}]+\}', '', raw).strip()
                                                      raise StopIteration
              except StopIteration:
                  pass

          section = (
              f"**{word.capitalize()}**\n\n"
              f"Definition: {definition}\n\n"
              f"Example: {example if example else 'No example provided'}"
          )

          start_marker = "<!-- WORD_OF_THE_DAY_START -->"
          end_marker = "<!-- WORD_OF_THE_DAY_END -->"

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          if start_marker not in readme or end_marker not in readme:
              print("ERROR: Markers not found in README.md")
              exit(1)

          new_readme = (
              readme.split(start_marker)[0]
              + start_marker + "\n"
              + section + "\n"
              + end_marker
              + readme.split(end_marker)[1]
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print(f"Done: {word} — {definition}")
          PYEOF

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update Word of the Day" || echo "No changes to commit"
          git push
