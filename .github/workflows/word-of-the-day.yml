name: Word of the Day

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-word:
    runs-on: ubuntu-latest
    env:
      MW_API_KEY: ${{ secrets.MW_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Word of the Day and update README
        run: python3 fetch_word.py

      - name: Commit changes
        run: |
          git config --global user.name "nylla8444"
          git config --global user.email "110903853+nylla8444@users.noreply.github.com"
          git add README.md
          git commit -m "Update Word of the Day: $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
